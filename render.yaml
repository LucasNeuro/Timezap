# Blueprint Render: New → Blueprint → ligar ao repositório Git.
# Define MISTRAL_API_KEY em Environment (secret). Opcional: MISTRAL_MODEL_ID.
#
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: timezap-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
